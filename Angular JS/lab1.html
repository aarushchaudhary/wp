<html>
    <head>
        <script src = "./angular-1.8.2/angular.min.js">
        </script>
    </head>
    <body>
        <div ng-app="myApp" ng-controller="myCtrl">
            {{ firstname + " " + lastname }}
        </div>
        <script>
            var app = angular.module("myApp", []);
            app.controller("myCtrl",function($scope){
                $scope.firstname="Aarush";
                $scope.lastname="Chaudhary";
            });
        </script>
    </body>
</html>
