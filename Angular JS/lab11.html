<html>
    <head>
        <script src = "./angular-1.8.2/angular.min.js"></script>
    </head>
    <body ng-app="">
        <p>Double-click on your name</p>
        <h1 ng-dblclick="x=x+1" ng-init="x=0">Vinayak</h1>
        <p>The name has been double-clicked <b>{{x}}</b> times.</p>
        <p>The count of the variables "x" increases every time when you double-click the text.</p>
    </body>
</html>
