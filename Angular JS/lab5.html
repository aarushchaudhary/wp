<html>
    <script src = "./angular-1.8.2/angular.min.js"></script>
    <body>
        <div ng-app="" ng-init="names=[
            {name:'Sainath',country:'Japan'},
            {name:'Chetan',country:'China'},
            {name:'John',country:'Africa'},
            {name:'Abhiram',country:'South Korea'},
            {name:'Ananth',country:'USA'}]">
            <p>Looping with objects:</p>
            <ul>
                <li ng-repeat="x in names">
                    {{ x.name + ", " + x.country }}
                </li>
            </ul>
        </div>
    </body>
</html>
