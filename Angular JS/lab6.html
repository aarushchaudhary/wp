<html>
    <script src = "./angular-1.8.2/angular.min.js"></script>
    <body>
        <div ng-app="" ng-init="marks=[
            {name:'Aarush',sap:'70572400148',marks:'[34,35,36,37,38]'},
            {name:'Kevin',sap:'70572400148',marks:'[35,36,37,38,39]'},
            {name:'Paridhi',sap:'70572400152',marks:'[45,46,47,48,49]'},
            {name:'Anaaya',sap:'70572400189',marks:'[40,41,42,43,44]'},
            {name:'Jaami',sap:'70572400137',marks:'[49,50,49,50,49]'}]">
            <p>Looping with objects:</p>
            <ul>
                <li ng-repeat="x in marks">
                    {{ x.name + ", " + x.sap + ", " + x.marks }}
                </li>
            </ul>
        </div>
    </body>
</html>
