<html>
    <head>
        <script src = "./angular-1.8.2/angular.min.js">
        </script>
    </head>
    <body>
        <div ng-app="myApp" ng-controller="myCtrl">
            <p>The time is:</p>
            <h1>{{theTime}}</h1>
        </div>
        <p>The $interval; service runs a function every specified milliseconds.</p>
        <script>
            var app = angular.module('myApp',[]);
            app.controller('myCtrl',function($scope,$interval){
                $scope.theTime= new Date().toLocaleTimeString();
                $interval(function(){
                    $scope.theTime= new Date().toLocaleTimeString();
                },1000);
            });
        </script>
    </body>
</html>
