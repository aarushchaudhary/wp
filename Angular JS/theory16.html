<html>
    <head>
        <title>Angular JS Dependency Injection</title>
        <script src = "./angular-1.8.2/angular.min.js"></script>
    </head>
    <body ng-app="myApp">
        <div ng-controller="myController">
            <h3>Tutorial ID is: </h3>
            {{ID}}
        </div>
        <script>
            var sample = angular.module('myApp',[]);
            sample.value("id",101);
            sample.controller('myController',function($scope,id){
                $scope.ID=id;
            });
        </script>
    </body>
</html>
