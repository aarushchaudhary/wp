<html>
    <head>
        <script src = "./angular-1.8.2/angular.min.js">
        </script>
    </head>
    <body>
        <div ng-app = "">
            <p>Enter 1st no.: <input type="number" ng-model="n1"></p>
            <p>Enter 2nd no.: <input type="number" ng-model="n2"></p>
            <p>Addition: {{n1 + n2}}</p>
            <p>Multiplication: {{n1 * n2}}</p>
            <p>Substraction: {{n1 - n2}}</p>
            <p>Division: {{n1 / n2}}</p>
        </div>
    </body>
</html>
