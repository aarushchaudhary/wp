<html>
    <body>
        <form action="https://www.abc.com/index.html" method="post">
            <fieldset> <legend>Login Page</legend>
            <label>Username:</label>
            <input type="text" name="Your Name" placeholder="Enter Username" required="required" size="10" maxlength="7">
            <br/>
            <label>Password:</label>
            <input type="password" name="Your Password" placeholder="Enter Password" required="required">
            <br/>
            </fieldset>
            <label>Write your review below</label>
            <textarea name="Your Review" cols="25" rows="4"></textarea>
            <br/>
            <input type="radio" name="Gender"/>
            Male
            <input type="radio" name="Gender"/>
            Female
            <input type="radio" name="Gender" checked="checked"/>
            Prefer Not Say
            <br/>
            <input type="checkbox" name="menu" value="mb"/>
            Mutton Biriyani
            <input type="checkbox" name="menu" value="gkp"/>
            Galouti Kebab Paratha
            <input type="checkbox" name="menu" value="mn"/>
            Mutton Nihari
            <br/>
            <label>Select your year
            <select name="year" size="4" multiple="multiple">
                <option value="1st">1st Year</option>
                <option value="2nd">2nd Year</option>
                <option value="3rd">3rd Year</option>
                <option value="4th">4th Year</option>
            </select>
            </label>
            <br/>
            <label>Upload your resume
            <input type="file" name="uploadfile">
            </label>
            <br/>
            <label>Subscribe to our channel:
            <input type="text" name="email/">
            <input type="image" src="./images/logostme.png" width="80" height="20">
            </label>
            <br/>
            <input type="submit" name="submit" value="Click Me"/>
        </form>
    </body>
</html>
