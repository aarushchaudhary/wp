<html>
    <script>
        function validate(){
            var num=document.myform.num.value;
            if(isNaN(num)){
                document.getElementById("numloc").innerHTML="Enter Numeric value only";
                return false;
            }else if(num.length!=10){
                document.getElementById("numloc").innerHTML="Enter 10 digit number only";
                return false;
            }else if(num[0]==0||num[0]==1||num[0]==2||num[0]==3||num[0]==4||num[0]==5){
                document.getElementById("numloc").innerHTML="0,1,2,3,4,5 not allowed";
                return false;
            }else{
                return true;
            }
        }
    </script>
    <body>
        <form name="myform" action="" onsubmit="return validate()">
            Number: <input type="text" name="num"><span id="numloc"></span><br/>
            <input type="submit" value="submit">
        </form>
    </body>
</html>
